<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - Cyber Panel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --accent: #00ff41; --bg: #000; --card: #0a0a0a; --border: #222; --vip: #ffd700; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: #fff; padding: 20px; display: flex; flex-direction: column; min-height: 100vh; }
        
        /* Header */
        .header { display: flex; align-items: center; text-align: left; margin-bottom: 20px; }
        .header a { color: var(--accent); font-size: 1.5rem; margin-right: 20px; text-decoration: none; }
        .header h2 { font-size: 1.3rem; color: #fff; }

        /* Settings Box */
        .settings-container { background: var(--card); border: 1px solid var(--border); border-radius: 15px; padding: 15px; margin-bottom: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        
        /* Settings Row */
        .settings-row { display: flex; flex-direction: column; padding: 18px 5px; border-bottom: 1px solid #111; text-align: left; }
        .settings-row:last-child { border-bottom: none; }
        
        .row-label { font-size: 0.9rem; font-weight: bold; color: #fff; display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        .row-label i { color: var(--accent); width: 20px; text-align: center; }
        .row-desc { font-size: 0.75rem; color: #666; margin-left: 30px; margin-top: -8px; margin-bottom: 12px; }

        /* Action Buttons */
        .btn { border: none; padding: 11px 22px; border-radius: 8px; font-size: 0.85rem; font-weight: bold; cursor: pointer; transition: 0.3s; display: inline-flex; align-items: center; gap: 8px; margin-left: 30px; width: fit-content; }
        
        .vip-btn { background: var(--vip); color: #000; }
        .vip-btn:hover { background: #e6be00; box-shadow: 0 0 12px rgba(255, 215, 0, 0.4); }
        
        .logout-btn { background: transparent; border: 1px solid #ff3e3e; color: #ff3e3e; }
        .logout-btn:hover { background: #ff3e3e; color: #fff; box-shadow: 0 0 12px rgba(255, 62, 62, 0.4); }

        /* Credentials Display Terminal Box */
        .cred-display { display: none; background: #050505; border: 1px solid #333; border-radius: 8px; padding: 12px; margin-left: 30px; margin-top: 10px; font-family: monospace; font-size: 0.8rem; line-height: 1.5; }
        .cred-item { color: #aaa; }
        .cred-item b { color: var(--vip); }

        /* Status Toast Alert */
        .toast { display: none; background: #111; border: 1px solid var(--accent); color: var(--accent); padding: 12px; border-radius: 8px; font-size: 0.8rem; font-family: monospace; text-align: center; margin-top: 15px; animation: fadeIn 0.4s ease; }

        /* Developer Footer Branding */
        .dev-footer { margin-top: auto; padding: 15px; font-size: 0.75rem; color: #555; letter-spacing: 1px; font-weight: bold; text-transform: uppercase; text-align: center; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="header">
        <a href="#" onclick="window.history.back(); return false;"><i class="fas fa-arrow-left"></i></a> 
        <h2>Settings</h2>
    </div>

    <div class="settings-container">
        
        <div class="settings-row">
            <div class="row-label">
                <i class="fas fa-crown" style="color: var(--vip);"></i> <span>VIP Membership Key</span>
            </div>
            <div class="row-desc">If you forgot your purchased VIP login details, click below to recover them.</div>
            <button class="btn vip-btn" onclick="viewVipCredentials()">
                <i class="fas fa-eye"></i> View VIP Details
            </button>
            
            <div class="cred-display" id="vipCredBox"></div>
        </div>

        <div class="settings-row">
            <div class="row-label">
                <i class="fas fa-sign-out-alt" style="color: #ff3e3e;"></i> <span>Logout VIP Session</span>
            </div>
            <div class="row-desc">Instantly log out and terminate the premium session on this browser.</div>
            <button class="btn logout-btn" onclick="logoutVipSession()">
                <i class="fas fa-lock"></i> Lock VIP Menu
            </button>
        </div>

        <div class="toast" id="statusToast"></div>

    </div>

    <div class="dev-footer">
        <i class="fas fa-code" style="color: var(--accent);"></i> Cyber Tools Developer Arif
    </div>

    <script>
        function viewVipCredentials() {
            let credBox = document.getElementById('vipCredBox');
            let savedUser = localStorage.getItem('vipUser');
            let savedKey = localStorage.getItem('vipKey');

            if (savedUser && savedKey) {
                credBox.innerHTML = `
                    <div class="cred-item">[+] STATUS: <b style="color: #00ff41;">ACTIVE (VIP)</b></div>
                    <div class="cred-item">[+] USERNAME: <b>${savedUser}</b></div>
                    <div class="cred-item">[+] ACCESS KEY: <b>${savedKey}</b></div>
                `;
                credBox.style.border = "1px dashed var(--vip)";
            } else {
                credBox.innerHTML = `
                    <div class="cred-item" style="color: #ff3e3e;">[-] ERROR: No active VIP account found on this device.</div>
                    <div class="cred-item" style="font-size: 0.75rem; color: #666; margin-top: 5px;">Contact Developer Arif to purchase a premium license key.</div>
                `;
                credBox.style.border = "1px dashed #ff3e3e";
            }
            
            if (credBox.style.display === "block") {
                credBox.style.display = "none";
            } else {
                credBox.style.display = "block";
            }
        }

        // সেটিংস থেকে লগআউট করার নিখুঁত ফাংশন
        function logoutVipSession() {
            // ইউজার মেম্বার কি না তা চেক করা
            if (!localStorage.getItem('vipUser')) {
                alert("You are not logged into any VIP account.");
                return;
            }

            let confirmAction = confirm("Are you sure you want to lock and log out of the VIP Menu?");
            
            if (confirmAction) {
                // ১. VIP পেজের আসল স্ট্যাটাস ও ইউজার ডিলিট করা
                localStorage.removeItem('vip_status');
                localStorage.removeItem('vip_user');
                
                // ২. সেটিংসের মেমোরি ব্যাকআপ ডাটা ক্লিয়ার করা
                localStorage.removeItem('vipUser');
                localStorage.removeItem('vipKey');
                
                document.getElementById('vipCredBox').style.display = 'none';
                
                let toast = document.getElementById('statusToast');
                toast.innerText = "[+] VIP Access locked successfully. All active keys wiped from session memory.";
                toast.style.display = 'block';

                // ৩ সেকেন্ড পর হোম পেজে রিডাইরেক্ট করে দেওয়া
                setTimeout(() => {
                    window.location.href = "index.html";
                }, 2000);
            }
        }
    </script>
</body>
</html>
