<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>🎯 Arif Age Calculator</title>

<!-- Confetti -->
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<style>
/* ====== Base ====== */
body {
    margin: 0;
    padding: 20px;
    font-family: 'Orbitron', sans-serif, 'Segoe UI Emoji','Noto Color Emoji','Arial',sans-serif;
    background: #0a0a0a;
    color: #0ff;
    transition: 0.4s;
}

#clock {
    text-align: center;
    font-size: 20px;
    font-weight: bold;
    margin-bottom: 15px;
}

/* ====== Container ====== */
.container {
    width: 95%;
    max-width: 600px;
    margin: auto;
    padding: 20px;
    border-radius: 12px;
    border: 1px solid currentColor;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(6px);
    box-sizing: border-box;
}

/* ====== Titles ====== */
h1 {
    font-size: 26px;
    text-align: center;
    margin-bottom: 15px;
}

/* ====== Inputs / Buttons ====== */
input, select, button {
    width: 100%;
    max-width: 100%;
    padding: 10px;
    margin: 8px 0;
    border-radius: 8px;
    border: 2px solid currentColor;
    background: transparent;
    color: inherit;
    font-size: 16px;
    box-sizing: border-box;
    transition: 0.3s;
}

input:focus, select:focus, button:focus {
    outline: none;
    border-color: #0ff;
}

button {
    cursor: pointer;
    font-weight: bold;
    background: #000;
    transition: 0.3s;
}

button:hover {
    background: #0ff;
    color: #000;
}

/* ====== Result Boxes ====== */
.result, .zodiac, .advice, .funFact {
    margin-top: 10px;
    padding: 12px;
    border-radius: 8px;
    border: 1px solid currentColor;
    background: rgba(255,255,255,0.08);
    transition: 0.3s;
    word-break: break-word;
}

/* ====== Blink animation ====== */
.blink {
    animation: blink 1s infinite;
}

@keyframes blink {
    0%,50%,100% { opacity: 1; }
    25%,75% { opacity: 0; }
}

/* ====== Social share buttons ====== */
#socialShare button {
    margin: 5px 2px;
    padding: 10px;
    font-size: 14px;
}

/* ====== Responsive ====== */
@media (max-width: 480px){
    h1 { font-size: 22px; }
    input, select, button { font-size: 14px; padding: 8px; }
    .result, .zodiac, .advice, .funFact { font-size: 13px; }
}
</style>
</head>
<body>

<div id="clock"></div>

<div class="container">
    <h1>🎯 Age Calculator</h1>

    <label>Select your birthdate:</label>
    <input type="date" id="dob">

    <label>Select Language:</label>
    <select id="language">
        <option value="en">English</option>
        <option value="bn">বাংলা</option>
    </select>

    <label>Background Music:</label>
    <select onchange="toggleMusic(this.value)">
        <option value="off">Off</option>
        <option value="on">On</option>
    </select>

    <button onclick="calculateAge()">Calculate Age</button>
    <button onclick="toggleShare()">Share Result</button>

    <div id="socialShare" style="display:none;">
        <button onclick="shareWhatsApp()">WhatsApp</button>
        <button onclick="shareFacebook()">Facebook</button>
    </div>

    <div class="result" id="result"></div>
    <div class="zodiac" id="chineseZodiac"></div>
    <div class="zodiac" id="luckyNumber"></div>
    <div class="advice" id="lifeAdvice"></div>
    <div class="funFact" id="funFact"></div>
</div>

<audio id="bgMusic" loop>
  <source src="https://www.bensound.com/bensound-music/bensound-sunny.mp3" type="audio/mpeg">
</audio>

<script>
/* ====== Clock ====== */
function updateClock(){
    let now = new Date();
    let options = { weekday:'long', year:'numeric', month:'long', day:'numeric' };
    document.getElementById("clock").innerText = now.toLocaleDateString(undefined, options) + " " + now.toLocaleTimeString();
}
setInterval(updateClock,1000);
updateClock();

/* ====== Zodiac ====== */
const zodiacSigns = ["Rat","Ox","Tiger","Rabbit","Dragon","Snake","Horse","Goat","Monkey","Rooster","Dog","Pig"];
const zodiacEmojis = ["🐀","🐂","🐅","🐇","🐉","🐍","🐎","🐐","🐒","🐓","🐕","🐖"];

/* ====== Music ====== */
function toggleMusic(val){
    let m = document.getElementById("bgMusic");
    if(val==="on") m.play().catch(()=>alert("Tap somewhere to enable sound!"));
    else { m.pause(); m.currentTime = 0; }
}

/* ====== Birthday Confetti ====== */
function celebrateBirthday(){
    confetti({ particleCount:150, spread:80, origin:{ y:0.6 } });
    alert("🎉 Happy Birthday! 🎉");
}

/* ====== Lucky Number ====== */
function getLuckyNumber(d){
    let str = d.getDate().toString().padStart(2,'0') +
              (d.getMonth()+1).toString().padStart(2,'0') +
              d.getFullYear().toString();
    let s=0;
    for(let c of str) s+=parseInt(c);
    while(s>=10) s = s.toString().split("").reduce((a,b)=>a+parseInt(b),0);
    return s;
}

/* ====== Life Advice ====== */
function getLifeAdvice(age, lang){
    if(lang==='bn'){
        if(age<13) return "শিশুকাল উপভোগ করুন!";
        if(age<20) return "লক্ষ্যে মনোনিবেশ করুন এবং বন্ধুদের সাথে সময় কাটান।";
        if(age<30) return "নিজেকে গড়ে তুলুন এবং ক্যারিয়ারে মন দিন।";
        if(age<50) return "কাজ, পরিবার ও স্বপ্নের মধ্যে ব্যালান্স রাখুন।";
        return "জ্ঞান ভাগ করুন, সুস্থ থাকুন এবং জীবন উপভোগ করুন!";
    }
    if(age<13) return "Learn, play and enjoy childhood!";
    if(age<20) return "Focus on goals, explore tech and friends.";
    if(age<30) return "Grow yourself and your career.";
    if(age<50) return "Balance work, family, and dreams.";
    return "Share wisdom, stay healthy and enjoy life!";
}

/* ====== Fun Fact ====== */
function getFunFact(d){
    const facts = [
        "On this day, some famous people were born!",
        "Today is a great day to start something new!",
        "The stars say it's a lucky day for you!",
        "This date has some historical events!",
        "Fun fact: Your zodiac can influence your mood today!"
    ];
    return facts[d.getDate() % facts.length];
}

/* ====== Calculate Age ====== */
function calculateAge(){
    let v = document.getElementById("dob").value;
    let lang = document.getElementById("language").value;
    if(!v) return alert(lang==='bn'? "জন্মতারিখ নির্বাচন করুন!" : "Select birthdate!");

    let dob = new Date(v);
    let t = new Date();

    let Y = t.getFullYear() - dob.getFullYear();
    let M = t.getMonth() - dob.getMonth();
    let D = t.getDate() - dob.getDate();
    if(D<0){ M--; D += new Date(t.getFullYear(), t.getMonth(), 0).getDate(); }
    if(M<0){ Y--; M += 12; }

    document.getElementById("result").innerHTML =
        lang==='bn' ? `আপনি ${Y} বছর, ${M} মাস এবং ${D} দিন বয়সী` 
                    : `You are ${Y} years, ${M} months and ${D} days old.`;

    let sign = zodiacSigns[dob.getFullYear()%12];
    let emoji = zodiacEmojis[dob.getFullYear()%12];
    document.getElementById("chineseZodiac").innerHTML =
        lang==='bn' ? `চীনা রাশি: <b>${sign} ${emoji}</b>` 
                    : `Chinese Zodiac: <b>${sign} ${emoji}</b>`;

    let lucky = getLuckyNumber(dob);
    document.getElementById("luckyNumber").innerHTML =
        lang==='bn' ? `লাকি নাম্বার: <b class="blink">${lucky}</b>` 
                    : `Lucky Number: <b class="blink">${lucky}</b>`;

    document.getElementById("lifeAdvice").innerHTML =
        `<b>${lang==='bn'? "জীবনের পরামর্শ" : "Life Advice"}:</b> ${getLifeAdvice(Y, lang)}`;

    document.getElementById("funFact").innerHTML =
        `<b>${lang==='bn'? "ফানি ফ্যাক্ট" : "Fun Fact"}:</b> ${getFunFact(dob)}`;

    if(dob.getDate()===t.getDate() && dob.getMonth()===t.getMonth())
        celebrateBirthday();
}

/* ====== Social Share ====== */
function toggleShare(){
    let el = document.getElementById("socialShare");
    el.style.display = (el.style.display==="none") ? "block" : "none";
}

function getShareText(){
    return document.getElementById("result").innerText + "\n" +
           document.getElementById("chineseZodiac").innerText + "\n" +
           document.getElementById("luckyNumber").innerText + "\n" +
           document.getElementById("lifeAdvice").innerText + "\n" +
           document.getElementById("funFact").innerText;
}

function shareWhatsApp(){
    let text = encodeURIComponent(getShareText());
    window.open(`https://wa.me/?text=${text}`, "_blank");
}

function shareFacebook(){
    let text = encodeURIComponent(getShareText());
    let url = encodeURIComponent(window.location.href);
    window.open(`https://www.facebook.com/sharer/sharer.php?u=${url}&quote=${text}`, "_blank");
}
</script>

</body>
  </html>
