<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>BMI ক্যালকুলেটর - আরিফ (Fixed)</title>
<style>
  body {
    font-family: 'Noto Sans Bengali', sans-serif;
    background: #f9f9f9;
    color: #222;
    margin: 0; padding: 20px;
    transition: background 0.3s, color 0.3s;
  }
  .dark-mode {
    background: #121212;
    color: #eee;
  }
  .container {
    max-width: 400px;
    margin: auto;
    background: #fff;
    border-radius: 12px;
    padding: 25px;
    box-shadow: 0 6px 15px rgba(0,0,0,0.1);
  }
  .dark-mode .container {
    background: #222;
    box-shadow: 0 6px 20px rgba(255,255,255,0.1);
  }
  h1 {
    text-align: center;
    color: crimson;
    margin-bottom: 20px;
  }
  label {
    display: block;
    margin-top: 15px;
    font-weight: bold;
  }
  select, input[type="number"] {
    width: 100%;
    padding: 10px;
    font-size: 1em;
    margin-top: 5px;
    border-radius: 8px;
    border: 1px solid #ccc;
    box-sizing: border-box;
  }
  .buttons {
    margin-top: 20px;
    text-align: center;
  }
  button {
    padding: 12px 20px;
    margin: 5px;
    border: none;
    background: crimson;
    color: #fff;
    border-radius: 10px;
    font-size: 1em;
    cursor: pointer;
    transition: background 0.3s;
  }
  button:hover {
    background: #b22222;
  }
  #result {
    margin-top: 25px;
    background: #ffeaea;
    border-radius: 10px;
    padding: 15px;
    font-size: 1.1em;
    text-align: center;
    min-height: 50px;
  }
  .dark-mode #result {
    background: #4a1a1a;
  }
  #credit {
    text-align: center;
    margin-top: 30px;
    font-size: 0.9em;
    color: gray;
  }
</style>
</head>
<body>

  <div class="container">
    <h1>BMI ক্যালকুলেটর</h1>
    
    <label for="weight">ওজন (Weight):</label>
    <input type="number" id="weight" min="1" placeholder="ওজন লিখুন" />
    
    <label for="weightUnit">ওজনের ইউনিট:</label>
    <select id="weightUnit">
      <option value="kg" selected>কিলোগ্রাম (Kg)</option>
      <option value="lb">পাউন্ড (Lb)</option>
    </select>
    
    <label for="height">উচ্চতা (Height):</label>
    <input type="number" id="height" min="1" placeholder="উচ্চতা লিখুন" />
    
    <label for="heightUnit">উচ্চতার ইউনিট:</label>
    <select id="heightUnit">
      <option value="cm" selected>সেন্টিমিটার (cm)</option>
      <option value="inch">ইঞ্চি (inch)</option>
    </select>
    
    <div class="buttons">
      <button id="calculateBtn">হিসাব করো</button>
      <button id="resetBtn">রিসেট</button>
      <button id="darkModeBtn">🌗 মোড</button>
    </div>
    
    <div id="result"></div>
    
    <div id="credit">ডেভেলপার: <strong>আরিফ</strong></div>
  </div>

<script>
  // Wait for DOM fully loaded before adding event listeners
  document.addEventListener('DOMContentLoaded', function () {
    const calculateBtn = document.getElementById('calculateBtn');
    const resetBtn = document.getElementById('resetBtn');
    const darkModeBtn = document.getElementById('darkModeBtn');
    const resultDiv = document.getElementById('result');

    calculateBtn.addEventListener('click', function () {
      const weightInput = document.getElementById('weight');
      const weightUnit = document.getElementById('weightUnit').value;
      const heightInput = document.getElementById('height');
      const heightUnit = document.getElementById('heightUnit').value;

      let weight = parseFloat(weightInput.value);
      let height = parseFloat(heightInput.value);

      if (!weight || weight <= 0 || !height || height <= 0) {
        alert('সঠিক ওজন এবং উচ্চতা লিখুন!');
        return;
      }

      // Convert weight to kg if lb
      if (weightUnit === 'lb') {
        weight = weight * 0.453592;
      }
      // Convert height to meters
      if (heightUnit === 'cm') {
        height = height / 100;
      } else if (heightUnit === 'inch') {
        height = height * 0.0254;
      }

      const bmi = weight / (height * height);
      let category = '';

      if (bmi < 18.5) {
        category = 'অল্প ওজন (Underweight)';
      } else if (bmi < 25) {
        category = 'স্বাভাবিক ওজন (Normal weight)';
      } else if (bmi < 30) {
        category = 'অতিরিক্ত ওজন (Overweight)';
      } else {
        category = 'স্থূলতা (Obesity)';
      }

      resultDiv.innerHTML = `তোমার BMI: <strong>${bmi.toFixed(2)}</strong><br>পরিচিতি: <strong>${category}</strong>`;
    });

    resetBtn.addEventListener('click', function () {
      document.getElementById('weight').value = '';
      document.getElementById('height').value = '';
      document.getElementById('weightUnit').value = 'kg';
      document.getElementById('heightUnit').value = 'cm';
      resultDiv.innerHTML = '';
    });

    darkModeBtn.addEventListener('click', function () {
      document.body.classList.toggle('dark-mode');
    });
  });
</script>

</body>
</html>
