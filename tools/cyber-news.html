<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Intel Core - Cyber Tools</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --accent: #00ff41; 
            --bg: #020202; 
            --card: rgba(13, 13, 13, 0.85); 
            --border: #1a1a1a; 
            --text-main: #ffffff;
            --text-body: #d1d1d1;
            --text-muted: #555555; 
            --glow: 0 0 15px rgba(0, 255, 65, 0.25);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif; }
        
        body { background-color: var(--bg); color: var(--text-main); padding-bottom: 40px; background-image: radial-gradient(rgba(0, 255, 65, 0.05) 1px, transparent 0); background-size: 24px 24px; }

        /* Premium Sticky Header */
        header { display: flex; align-items: center; justify-content: space-between; padding: 15px 20px; position: sticky; top: 0; background: rgba(2, 2, 2, 0.9); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); z-index: 100; border-bottom: 1px solid var(--border); }
        .header-left { display: flex; align-items: center; }
        header a { color: var(--accent); font-size: 1.4rem; margin-right: 20px; text-decoration: none; transition: 0.3s; }
        header a:hover { text-shadow: var(--glow); }
        header h2 { font-size: 1.1rem; letter-spacing: 2px; font-weight: 800; font-family: monospace; }
        header h2 span { color: var(--accent); text-shadow: var(--glow); }

        /* Google Translate Custom Design */
        #google_translate_element { background: #111; border: 1px solid var(--accent); border-radius: 8px; padding: 2px 5px; font-size: 0.8rem; }
        .goog-te-gadget select { background: #000 !important; color: var(--accent) !important; border: none !important; font-family: monospace !important; padding: 3px !important; outline: none; }
        .goog-te-banner-frame.skiptranslate, .goog-te-gadget span { display: none !important; }
        body { top: 0px !important; }

        .container { max-width: 480px; margin: 0 auto; padding: 20px 12px; }

        /* Premium Cyber Status Box */
        .intel-status { background: #000; border: 1px solid #222; border-radius: 12px; padding: 15px; margin-bottom: 25px; font-size: 0.75rem; line-height: 1.6; font-family: monospace; color: #888; position: relative; box-shadow: inset 0 0 15px rgba(0,0,0,0.9); }
        .intel-status b { color: var(--accent); }
        .blink { animation: blinker 1s linear infinite; color: var(--accent); font-weight: bold; }
        @keyframes blinker { 50% { opacity: 0; } }

        /* Advanced Cyber News Card */
        .news-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 20px; margin-bottom: 24px; backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px); transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1); position: relative; }
        .news-card:hover { border-color: var(--accent); box-shadow: var(--glow); transform: translateY(-3px); }
        
        .news-meta { font-size: 0.75rem; color: var(--text-muted); margin-bottom: 14px; display: flex; justify-content: space-between; font-weight: 700; font-family: monospace; border-bottom: 1px solid #1a1a1a; padding-bottom: 10px; }
        .news-meta span i { color: var(--accent); margin-right: 5px; }
        
        .news-thumbnail { width: 100%; height: 180px; object-fit: cover; border-radius: 10px; margin-bottom: 14px; border: 1px solid #222; }
        .news-title { font-size: 1.05rem; font-weight: 700; color: var(--text-main); margin-bottom: 12px; line-height: 1.45; letter-spacing: -0.2px; text-align: left; transition: 0.3s; }
        .news-card:hover .news-title { color: var(--accent); text-shadow: 0 0 5px rgba(0, 255, 65, 0.2); }
        .news-content { font-size: 0.88rem; color: var(--text-body); line-height: 1.6; text-align: left; margin-bottom: 18px; font-weight: 400; letter-spacing: 0.1px; }
        
        /* Button */
        .read-more-btn { display: flex; align-items: center; justify-content: center; gap: 8px; background: rgba(0, 255, 65, 0.04); border: 1px solid rgba(0, 255, 65, 0.15); color: var(--accent); padding: 12px 0; width: 100%; border-radius: 10px; font-size: 0.82rem; text-decoration: none; font-weight: 700; letter-spacing: 1px; transition: 0.3s; font-family: monospace; }
        .read-more-btn:hover { background: var(--accent); color: #000; border-color: var(--accent); box-shadow: var(--glow); }

        /* Loader */
        .loader { text-align: center; padding: 60px 0; color: var(--accent); font-size: 0.85rem; font-family: monospace; letter-spacing: 1.5px; }
        .loader i { animation: spin 1.2s linear infinite; margin-bottom: 12px; font-size: 2rem; display: block; color: var(--accent); }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <a href="index.html"><i class="fas fa-arrow-left"></i></a>
            <h2>[+] CYBER_INTEL_<span>FEED</span></h2>
        </div>
        <div id="google_translate_element"></div>
    </header>

    <div class="container">
        
        <div class="intel-status">
            [<b>system@mainframe</b>]:~$ fetch --hacking-news<br>
            [<b>feed</b>]: <span style="color: var(--accent); font-weight: bold;">THE_HACKER_NEWS_CORE_CONNECTED</span><br>
            [<b>logs</b>]: PARSING LIVE EXPLOITS & MALWARE CAMPAIGNS<span class="blink">...</span>
        </div>

        <div id="newsContainer">
            <div class="loader">
                <i class="fas fa-circle-notch"></i>
                EXTRACTING CYBER INTEL...
            </div>
        </div>

    </div>

    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({
                pageLanguage: 'en', 
                includedLanguages: 'bn,hi,en', // বাংলা, হিন্দি এবং ইংরেজি অপশন থাকবে
                layout: google.translate.TranslateElement.InlineLayout.SIMPLE
            }, 'google_translate_element');
        }
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

    <script>
        window.onload = function() {
            fetchHackingNews();
        }

        function fetchHackingNews() {
            let container = document.getElementById('newsContainer');
            
            let rssUrl = encodeURIComponent("https://feeds.feedburner.com/TheHackerNews");
            let apiUrl = `https://api.rss2json.com/v1/api.json?rss_url=${rssUrl}`;

            fetch(apiUrl)
                .then(response => response.json())
                .then(data => {
                    if (data.status === "ok" && data.items.length > 0) {
                        container.innerHTML = ""; 
                        
                        let newsList = data.items.slice(0, 10); 
                        
                        newsList.forEach(item => {
                            let rawDate = new Date(item.pubDate);
                            let formattedDate = rawDate.toLocaleDateString() || 'Live';
                            
                            let cleanContent = item.description.replace(/<[^>]*>/g, '');
                            if (cleanContent.length > 150) {
                                cleanContent = cleanContent.substring(0, 150) + "...";
                            }

                            let thumbnailHtml = item.thumbnail ? `<img src="${item.thumbnail}" class="news-thumbnail" alt="Cyber Intel">` : '';

                            let card = document.createElement('div');
                            card.className = 'news-card';
                            
                            card.innerHTML = `
                                <div class="news-meta">
                                    <span><i class="fas fa-biohazard"></i> TARGET: CYBER_WORLD</span>
                                    <span><i class="far fa-clock"></i> ${formattedDate}</span>
                                </div>
                                ${thumbnailHtml}
                                <div class="news-title">${item.title}</div>
                                <div class="news-content">${cleanContent}</div>
                                <a href="${item.link}" target="_blank" class="read-more-btn">
                                    <span>DECRYPT FULL LOGS</span> <i class="fas fa-unlock-alt"></i>
                                </a>
                            `;
                            
                            container.appendChild(card);
                        });
                    } else {
                        container.innerHTML = "<div class='loader' style='color: var(--accent);'>[-] DECRYPTION FAILED. RELOAD INTEL CORE.</div>";
                    }
                })
                .catch(error => {
                    console.error("Error:", error);
                    container.innerHTML = "<div class='loader' style='color: #ff3e3e; line-height: 1.8;'><i class='fas fa-radiation-alt' style='animation:none; font-size:1.8rem;'></i><br>[-] INTERCEPTED BY FIREWALL.<br>DEPLOY ON GITHUB FIRST.</div>";
                });
        }
    </script>
</body>
</html>
