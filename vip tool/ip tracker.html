<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced IP & Network Scouter</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --accent: #00ff41; --bg: #000; --card: #0a0a0a; --border: #222; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background: var(--bg); color: #fff; padding: 20px; text-align: center; }
        
        /* Header */
        .header { display: flex; align-items: center; text-align: left; margin-bottom: 25px; }
        .header a { color: var(--accent); font-size: 1.5rem; margin-right: 20px; text-decoration: none; }
        .header h2 { font-size: 1.3rem; color: #fff; }

        /* Description Box */
        .info-note { background: #111; border: 1px dashed #333; padding: 15px; border-radius: 12px; text-align: left; margin-bottom: 20px; font-size: 0.8rem; color: #aaa; line-height: 1.4; }

        /* Input Area */
        .search-box { display: flex; gap: 10px; margin-bottom: 20px; }
        .search-box input { flex: 1; background: var(--card); border: 1px solid var(--border); padding: 12px; border-radius: 10px; color: #fff; font-size: 0.9rem; outline: none; }
        .search-box input:focus { border-color: var(--accent); }
        .scout-btn { background: var(--accent); color: #000; border: none; padding: 0 20px; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 0.9rem; display: flex; align-items: center; gap: 5px; }
        .scout-btn:hover { background: #00cc33; }

        /* Result Grid */
        .result-container { display: none; grid-template-columns: repeat(2, 1fr); gap: 10px; text-align: left; margin-bottom: 20px; }
        .data-card { background: var(--card); border: 1px solid var(--border); padding: 12px; border-radius: 10px; }
        .data-card span { display: block; font-size: 0.65rem; color: #666; font-weight: bold; text-transform: uppercase; margin-bottom: 4px; }
        .data-card p { font-size: 0.85rem; color: #fff; font-weight: 500; word-break: break-all; }
        .data-card i { color: var(--accent); margin-right: 5px; }

        /* Live Map Container */
        .map-box { display: none; border: 1px solid var(--border); border-radius: 15px; overflow: hidden; background: var(--card); margin-top: 15px; box-shadow: 0 0 15px rgba(0,255,65,0.05); }
        .map-box h3 { font-size: 0.85rem; padding: 10px; color: var(--accent); text-align: left; border-bottom: 1px solid var(--border); background: #050505; }
        iframe { width: 100%; height: 250px; border: none; background: #000; }

        /* Loading Animation */
        .loader { display: none; margin: 30px auto; border: 3px solid #111; border-top: 3px solid var(--accent); border-radius: 50%; width: 35px; height: 35px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="header">
<div class="header">
    <a href="#" onclick="window.history.back(); return false;"><i class="fas fa-arrow-left"></i></a> 
    <h2>IP Tracker Pro</h2>
</div>
   
    </div>

    <div class="info-note">
        <i class="fas fa-user-secret" style="color: var(--accent);"></i> 
        যেকোনো সচল IPv4 বা IPv6 অ্যাড্রেস ইনপুট করুন। এই রিয়াল-টাইম সিকিউরিটি টুলটি আইপির হোস্ট নেটওয়ার্ক, আইএসপি এবং নিখুঁত ভৌগোলিক অবস্থান লাইভ ম্যাপে ট্র্যাক করে বের করবে।
    </div>

    <div class="search-box">
        <input type="text" id="ipInput" placeholder="এখানে IP Address লিখুন (উদা: 8.8.8.8)">
        <button class="scout-btn" onclick="scoutIP()"><i class="fas fa-crosshairs"></i> Scout</button>
    </div>

    <div class="loader" id="loading"></div>

    <div class="result-container" id="resultGrid">
        <div class="data-card">
            <span><i class="fas fa-network-wired"></i> IP Target</span>
            <p id="resIP">-</p>
        </div>
        <div class="data-card">
            <span><i class="fas fa-building"></i> ISP / Network</span>
            <p id="resISP">-</p>
        </div>
        <div class="data-card">
            <span><i class="fas fa-globe-asia"></i> Country</span>
            <p id="resCountry">-</p>
        </div>
        <div class="data-card">
            <span><i class="fas fa-city"></i> City / Region</span>
            <p id="resCity">-</p>
        </div>
        <div class="data-card">
            <span><i class="fas fa-clock"></i> Timezone</span>
            <p id="resTimezone">-</p>
        </div>
        <div class="data-card">
            <span><i class="fas fa-map-pin"></i> Coordinates</span>
            <p id="resCoords">-</p>
        </div>
    </div>

    <div class="map-box" id="mapBox">
        <h3><i class="fas fa-map-marked-alt"></i> LIVE GEOLOCATION TARGET</h3>
        <iframe id="googleMap" src=""></iframe>
    </div>

    <script>
        // পেজ লোড হলেই ইউজারের নিজস্ব আইপি ডিফল্ট হিসেবে ইনপুট বক্সে সেট হবে
        window.onload = function() {
            fetch('https://ipapi.co/json/')
                .then(res => res.json())
                .then(data => {
                    if(data.ip) document.getElementById('ipInput').value = data.ip;
                }).catch(() => {});
        }

        // আইপি ট্র্যাকিং এর আসল ফাংশন
        function scoutIP() {
            let ip = document.getElementById('ipInput').value.trim();
            if (!ip) {
                alert("দয়া করে একটি সঠিক IP Address লিখুন!");
                return;
            }

            // এলিমেন্টগুলো টার্গেট করা
            let loader = document.getElementById('loading');
            let grid = document.getElementById('resultGrid');
            let mapBox = document.getElementById('mapBox');
            let iframe = document.getElementById('googleMap');

            // রিসেট ও লোডিং অন করা
            loader.style.display = 'block';
            grid.style.styleDoc = 'none';
            grid.style.display = 'none';
            mapBox.style.display = 'none';

            // রিয়াল-টাইম লাইভ এপিআই ফেচিং (কোনো ফেক ডাটা নয়)
            fetch(`https://ipapi.co/${ip}/json/`)
                .then(response => response.json())
                .then(data => {
                    loader.style.display = 'none';

                    if (data.error) {
                        alert("IP টি ট্র্যাক করা সম্ভব হয়নি! দয়া করে সঠিক IPv4 অ্যাড্রেস দিন।");
                        return;
                    }

                    // স্ক্রিনে লাইভ ডাটা বসানো
                    document.getElementById('resIP').innerText = data.ip || '-';
                    document.getElementById('resISP').innerText = data.org || '-';
                    document.getElementById('resCountry').innerText = `${data.country_name} (${data.country_code})` || '-';
                    document.getElementById('resCity').innerText = `${data.city}, ${data.region}` || '-';
                    document.getElementById('resTimezone').innerText = data.timezone || '-';
                    document.getElementById('resCoords').innerText = `${data.latitude}, ${data.longitude}` || '-';

                    // গুগল ম্যাপ এম্বেড ইউআরএল তৈরি এবং লোড করা
                    if (data.latitude && data.longitude) {
                        let mapUrl = `https://maps.google.com/maps?q=${data.latitude},${data.longitude}&z=13&output=embed&t=m`;
                        iframe.src = mapUrl;
                        
                        // রেজাল্ট গ্রিড ও ম্যাপ শো করানো
                        grid.style.display = 'grid';
                        mapBox.style.display = 'block';
                    }
                })
                .catch(err => {
                    loader.style.display = 'none';
                    alert("নেটওয়ার্ক ত্রুটি! আবার চেষ্টা করুন।");
                });
        }
    </script>
</body>
  </html>
