<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verification Complete</title>
    <style>
        body {
            background: #0f172a;
            font-family: system-ui;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .card {
            background: #1e293b;
            padding: 40px;
            border-radius: 32px;
            text-align: center;
            max-width: 400px;
        }
        h2 { color: #10b981; margin-bottom: 16px; }
        p { color: #94a3b8; margin-bottom: 24px; }
        .loader {
            width: 40px;
            height: 40px;
            border: 4px solid #334155;
            border-top-color: #10b981;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
<div class="card">
    <div class="loader"></div>
    <h2>✓ Verification Complete</h2>
    <p>Your identity has been verified. Redirecting to secure page...</p>
</div>
<script>
    setTimeout(() => {
        window.location.href = "https://www.google.com";
    }, 3000);
</script>
</body>
</html>
